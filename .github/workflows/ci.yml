name: ci

on:
  push:
    branches: ["main", "master"]
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.94.1
          components: rustfmt, clippy

      - uses: taiki-e/install-action@cargo-llvm-cov

      - name: Format
        run: cargo fmt --all --check

      - name: Lint
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Tests
        run: cargo test --workspace

      - name: Coverage gate
        shell: bash
        run: |
          RUST_LINES=$(python -c "import json; print(json.load(open('config/coverage-gate.json'))['rust']['lines'])")
          RUST_FUNCTIONS=$(python -c "import json; print(json.load(open('config/coverage-gate.json'))['rust']['functions'])")
          RUST_REGIONS=$(python -c "import json; print(json.load(open('config/coverage-gate.json'))['rust']['regions'])")
          cargo llvm-cov --workspace --all-features --lcov --output-path coverage.lcov --fail-under-lines "$RUST_LINES" --fail-under-functions "$RUST_FUNCTIONS" --fail-under-regions "$RUST_REGIONS"

  frontend-scaffold:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install frontend dependencies
        run: npm ci
      - name: Workspace smoke check
        run: |
          npm --version
          node -e "const pkg=require('./package.json'); console.log(pkg.name)"
      - name: Frontend lint
        run: npm run lint
      - name: Frontend tests
        run: npm test

  desktop-shell:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.94.1
          components: rustfmt, clippy
      - name: Desktop shell format
        run: cargo fmt --manifest-path apps/desktop/src-tauri/Cargo.toml --check
      - name: Desktop shell lint
        run: cargo clippy --manifest-path apps/desktop/src-tauri/Cargo.toml --all-targets -- -D warnings
      - name: Desktop shell backend tests
        run: cargo test --manifest-path apps/desktop/src-tauri/Cargo.toml
