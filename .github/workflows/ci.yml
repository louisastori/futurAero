name: ci

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.94.1
          components: rustfmt, clippy

      - uses: taiki-e/install-action@cargo-llvm-cov

      - name: Format
        run: cargo fmt --all --check

      - name: Lint
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Tests
        run: cargo test --workspace

      - name: Coverage gate
        run: cargo llvm-cov --workspace --all-features --lcov --output-path coverage.lcov --fail-under-lines 100 --fail-under-functions 100 --fail-under-regions 100

  frontend-scaffold:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Enable pnpm
        run: corepack enable
      - name: Workspace smoke check
        run: |
          pnpm --version
          node -e "const pkg=require('./package.json'); console.log(pkg.name)"

